name: Deploy Azure Function

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AZURE_CREDENTIALS secret
        run: |
          set -e
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "Missing AZURE_CREDENTIALS secret" >&2
            exit 1
          fi
          echo "Validating AZURE_CREDENTIALS JSON..."
          echo "${{ secrets.AZURE_CREDENTIALS }}" | jq -e . >/dev/null || (echo "AZURE_CREDENTIALS is not valid JSON" >&2; exit 1)
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./azure/functions/copy-worker
        run: |
          npm ci

      - name: Build (placeholder)
        working-directory: ./azure/functions/copy-worker
        run: |
          # add build steps if needed
          echo "no build step"

      - name: Archive function package
        run: |
          cd azure/functions/copy-worker
          zip -r ../../copy-worker-package.zip .

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure login
        run: |
          az account show
        shell: bash

      - name: Deploy Function App (zip deploy)
        uses: azure/webapps-deploy@v2
        with:
          app-name: team-recordings-copier
          slot-name: production
          package: copy-worker-package.zip
