name: Deploy Logic App (ARM)

on:
  workflow_dispatch:

jobs:
  deploy-logicapp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Logic App ARM template
        uses: azure/arm-deploy@v1
        with:
          scope: resourceGroup
          resourceGroupName: ${{ secrets.RESOURCE_GROUP }}
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          template: ./azure/logic-apps/logicapp-enqueue-template.json
          parameters: |
            {
              "logicAppName": { "value": "${{ secrets.LOGIC_APP_NAME }}" }
            }
