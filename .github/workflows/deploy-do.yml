name: Build and Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build
        run: |
          npm run build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Prepare DigitalOcean App manifest
        env:
          AZ_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZ_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GRAPH_STATE: ${{ secrets.GRAPH_NOTIFICATION_CLIENT_STATE }}
        run: |
          umask 077
          cat > do-app.yaml <<EOF
          name: teams-recording-app
          region: nyc3
          services:
            - name: web
              github:
                repo: yavdaanalytics/teams-recording-app
                branch: main
                deploy_on_push: true
              dockerfile_path: Dockerfile
              run_command: node dist/index.js
              instance_size_slug: basic-xxs
              instance_count: 1
              envs:
                - key: AZURE_TENANT_ID
                  value: "${AZ_TENANT}"
                  scope: RUN
                - key: AZURE_CLIENT_ID
                  value: "${AZ_CLIENT_ID}"
                  scope: RUN
                - key: AZURE_CLIENT_SECRET
                  value: "${AZ_CLIENT_SECRET}"
                  scope: RUN
                - key: AZURE_USE_MANAGED_IDENTITY
                  value: "false"
                  scope: RUN
                - key: GRAPH_NOTIFICATION_CLIENT_STATE
                  value: "${GRAPH_STATE}"
                  scope: RUN
          EOF

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Create or update DigitalOcean App
        run: |
          APP_ID=$(doctl apps list --output json | jq -r '.[] | select(.spec.name=="teams-recording-app") | .id')
          if [ -z "$APP_ID" ]; then
            doctl apps create --spec do-app.yaml
          else
            doctl apps update "$APP_ID" --spec do-app.yaml
          fi
